<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEET PG 2026 — Mission Under 1000</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --card: #161b24;
    --border: #1e2535;
    --gold: #d4a843;
    --gold-dim: #a07c2a;
    --green: #3ecf8e;
    --green-dim: #1a5c3e;
    --red: #e05c5c;
    --blue: #4b9eff;
    --text: #e8eaf0;
    --muted: #6b7280;
    --soft: #9ca3af;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0d1117 0%, #111827 50%, #0a0f1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 40px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(20px);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header h1 span { color: var(--text); }
  .header-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 400;
    font-family: 'DM Mono', monospace;
  }
  .countdown-box {
    background: linear-gradient(135deg, var(--gold-dim), #7a5a18);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    min-width: 140px;
  }
  .countdown-box .days {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }
  .countdown-box .label {
    font-size: 11px;
    color: #c8a050;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* PROGRESS STRIP */
  .progress-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .progress-bar-wrap {
    flex: 1;
    min-width: 200px;
    background: var(--border);
    border-radius: 100px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dim), var(--green));
    border-radius: 100px;
    transition: width 0.5s ease;
  }
  .progress-stats {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .stat {
    text-align: center;
  }
  .stat .val {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--green);
  }
  .stat .lab {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 14px 18px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .tab-badge {
    background: var(--border);
    color: var(--soft);
    border-radius: 100px;
    padding: 1px 7px;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
  }
  .tab-btn.active .tab-badge {
    background: var(--gold-dim);
    color: var(--gold);
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 40px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 28px;
    align-items: start;
  }

  /* SIDEBAR */
  .sidebar {
    position: sticky;
    top: 180px;
  }
  .sidebar-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .sidebar-card h3 {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .subject-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .subject-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--soft);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.15s;
    width: 100%;
  }
  .subject-btn:hover {
    background: var(--border);
    color: var(--text);
    border-color: var(--border);
  }
  .subject-btn.active {
    background: linear-gradient(135deg, #1a1f2e, #1e2535);
    border-color: var(--gold-dim);
    color: var(--gold);
  }
  .subject-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .subject-btn.active .subject-pct { color: var(--gold-dim); }
  .subj-mini-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 10px;
    margin-top: 4px;
    overflow: hidden;
  }
  .subj-mini-fill {
    height: 100%;
    background: var(--green);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* RESOURCE LINKS */
  .resource-link {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    text-decoration: none;
    color: var(--soft);
    font-size: 12px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .resource-link:hover {
    background: var(--border);
    color: var(--blue);
    border-color: var(--border);
  }
  .resource-link .ico {
    font-size: 16px;
    flex-shrink: 0;
  }

  /* CONTENT AREA */
  .content { min-width: 0; }

  /* SUBJECT HEADER */
  .subject-header {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 28px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .subject-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }
  .subject-header .meta {
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .subject-progress-big {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .big-pct {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--green);
  }
  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .reset-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* TOPIC SECTIONS */
  .section-group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .section-header:hover { background: rgba(255,255,255,0.02); }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gold-dim);
    flex-shrink: 0;
  }
  .section-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .section-chevron {
    color: var(--muted);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .section-chevron.open { transform: rotate(180deg); }
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
    padding: 8px;
  }
  .topic-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
    position: relative;
  }
  .topic-item:hover {
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
  }
  .topic-item.done {
    opacity: 0.65;
  }
  .topic-item.done .topic-name {
    text-decoration: line-through;
    color: var(--muted);
  }
  .checkbox {
    width: 18px;
    height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .topic-item.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }
  .checkmark {
    color: #0a0c10;
    font-size: 11px;
    font-weight: 700;
    display: none;
  }
  .topic-item.done .checkmark { display: block; }
  .topic-name {
    font-size: 13px;
    color: var(--soft);
    line-height: 1.3;
    flex: 1;
    transition: color 0.15s;
  }
  .topic-item:hover .topic-name { color: var(--text); }
  .high-yield {
    background: rgba(212,168,67,0.15);
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 9px;
    font-family: 'DM Mono', monospace;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* ROADMAP TAB */
  .roadmap-container { }
  .phase-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .phase-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .phase-number {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 900;
    flex-shrink: 0;
  }
  .phase-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .phase-dates { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .week-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .week-card {
    background: var(--card);
    padding: 20px;
  }
  .week-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .week-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .week-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .week-list li {
    font-size: 12px;
    color: var(--soft);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }
  .week-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--gold-dim);
    font-size: 10px;
    top: 1px;
  }
  .week-list li.rest { color: var(--green-dim); }
  .week-list li.test { color: var(--blue); }
  .week-list li.rest::before, .week-list li.test::before { color: currentColor; }

  /* RESOURCES TAB */
  .resources-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 20px;
  }
  .res-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
  }
  .res-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .res-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .res-card-header h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .res-card-header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }
  .res-link-list { display: flex; flex-direction: column; gap: 6px; }
  .res-link-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.15s;
    border: 1px solid transparent;
  }
  .res-link-item:hover {
    border-color: var(--blue);
    background: rgba(75,158,255,0.05);
  }
  .res-link-item .name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }
  .res-link-item .desc {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
    line-height: 1.4;
  }
  .res-link-item .arrow {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
    flex-shrink: 0;
    margin-top: 2px;
    transition: color 0.15s;
  }
  .res-link-item:hover .arrow { color: var(--blue); }
  .free-tag {
    background: rgba(62,207,142,0.15);
    border: 1px solid var(--green-dim);
    color: var(--green);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* PANEL visibility */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 14px; }

  /* MARK ALL */
  .mark-all-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .mark-all-btn:hover { border-color: var(--green); color: var(--green); }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; padding: 20px 16px; }
    .sidebar { position: static; }
    .header { padding: 20px 16px 16px; }
    .tabs { padding: 0 16px; }
    .header h1 { font-size: 22px; }
    .resources-container { grid-template-columns: 1fr; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <h1>NEET PG 2026 <span>— Mission Under 1000</span></h1>
      <div class="header-sub">📅 Exam: 30 Aug 2026 &nbsp;·&nbsp; Syllabus Deadline: 15 Aug 2026 &nbsp;·&nbsp; 83 study days remaining</div>
    </div>
    <div class="countdown-box">
      <div class="days" id="daysLeft">—</div>
      <div class="label">Days to Exam</div>
    </div>
  </div>
  <div class="progress-strip">
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="globalFill" style="width:0%"></div>
    </div>
    <div class="progress-stats">
      <div class="stat"><div class="val" id="doneCount">0</div><div class="lab">Done</div></div>
      <div class="stat"><div class="val" id="totalCount">0</div><div class="lab">Total</div></div>
      <div class="stat"><div class="val" id="pctDone">0%</div><div class="lab">Progress</div></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('subjects')">📚 Subjects <span class="tab-badge" id="subjBadge">19</span></button>
  <button class="tab-btn" onclick="showTab('roadmap')">🗺️ Roadmap</button>
  <button class="tab-btn" onclick="showTab('resources')">🔗 Resources</button>
</div>

<!-- SUBJECTS TAB -->
<div class="tab-panel active" id="tab-subjects">
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-card">
        <h3>Subjects</h3>
        <div class="subject-list" id="subjectList"></div>
      </div>
      <div class="sidebar-card">
        <h3>Quick Links</h3>
        <a href="https://www.prepladder.com" target="_blank" class="resource-link">🎓 PrepLadder</a>
        <a href="https://www.marrowusmle.com" target="_blank" class="resource-link">🔬 Marrow</a>
        <a href="https://dams.ac.in" target="_blank" class="resource-link">📖 DAMS</a>
        <a href="https://www.drnajeeb.com" target="_blank" class="resource-link">🎥 Dr. Najeeb Lectures</a>
        <a href="https://www.nbf.org.in" target="_blank" class="resource-link">📝 NBF Q Bank</a>
      </div>
    </div>
    <!-- CONTENT -->
    <div class="content" id="subjectContent"></div>
  </div>
</div>

<!-- ROADMAP TAB -->
<div class="tab-panel" id="tab-roadmap">
  <div style="max-width:1100px;margin:0 auto;padding:32px 40px;">
    <div id="roadmapContent"></div>
  </div>
</div>

<!-- RESOURCES TAB -->
<div class="tab-panel" id="tab-resources">
  <div style="max-width:1100px;margin:0 auto;padding:32px 40px;">
    <div class="resources-container" id="resourcesContent"></div>
  </div>
</div>

<script>

// ============================================================
// STATE
// ============================================================
let state = JSON.parse(localStorage.getItem('neetpg_state') || '{}');
let activeSubject = SUBJECTS[0].id;

function getKey(subjId, sIdx, tIdx) { return `${subjId}_${sIdx}_${tIdx}`; }
function isDone(subjId, sIdx, tIdx) { return !!state[getKey(subjId, sIdx, tIdx)]; }
function toggle(subjId, sIdx, tIdx) {
  const k = getKey(subjId, sIdx, tIdx);
  state[k] = !state[k];
  localStorage.setItem('neetpg_state', JSON.stringify(state));
  refreshAll();
}

function getSubjectStats(subj) {
  let total = 0, done = 0;
  subj.sections.forEach((sec, si) => sec.topics.forEach((_, ti) => { total++; if(isDone(subj.id,si,ti)) done++; }));
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}
function getGlobalStats() {
  let total = 0, done = 0;
  SUBJECTS.forEach(s => { const st = getSubjectStats(s); total += st.total; done += st.done; });
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// ============================================================
// RENDER
// ============================================================
function refreshAll() {
  updateGlobalProgress();
  renderSidebar();
  renderSubjectContent();
}

function updateGlobalProgress() {
  const g = getGlobalStats();
  document.getElementById('globalFill').style.width = g.pct + '%';
  document.getElementById('doneCount').textContent = g.done;
  document.getElementById('totalCount').textContent = g.total;
  document.getElementById('pctDone').textContent = g.pct + '%';
}

function renderSidebar() {
  const list = document.getElementById('subjectList');
  list.innerHTML = SUBJECTS.map(s => {
    const st = getSubjectStats(s);
    return `<button class="subject-btn ${s.id===activeSubject?'active':''}" onclick="selectSubject('${s.id}')">
      <div>
        <div>${s.name}</div>
        <div class="subj-mini-bar"><div class="subj-mini-fill" style="width:${st.pct}%"></div></div>
      </div>
      <span class="subject-pct">${st.pct}%</span>
    </button>`;
  }).join('');
}

function selectSubject(id) {
  activeSubject = id;
  renderSidebar();
  renderSubjectContent();
}

let openSections = {};
function toggleSection(key) {
  openSections[key] = !openSections[key];
  renderSubjectContent();
}

function renderSubjectContent() {
  const subj = SUBJECTS.find(s => s.id === activeSubject);
  if (!subj) return;
  const st = getSubjectStats(subj);
  const el = document.getElementById('subjectContent');

  let html = `<div class="subject-header">
    <div>
      <h2>${subj.name}</h2>
      <div class="meta">Weightage: ${subj.weightage} &nbsp;·&nbsp; ${st.done}/${st.total} topics done</div>
    </div>
    <div class="subject-progress-big">
      <div class="big-pct">${st.pct}%</div>
      <div>
        <button class="mark-all-btn" onclick="markAll('${subj.id}', true)">Mark All ✓</button><br><br>
        <button class="reset-btn" onclick="markAll('${subj.id}', false)">Reset</button>
      </div>
    </div>
  </div>`;

  subj.sections.forEach((sec, si) => {
    const secKey = `${subj.id}_${si}`;
    const isOpen = openSections[secKey] !== false; // default open
    const doneSec = sec.topics.filter((_,ti) => isDone(subj.id,si,ti)).length;
    html += `<div class="section-group">
      <div class="section-header" onclick="toggleSection('${secKey}')">
        <div class="section-title">
          <div class="section-dot" style="background:${subj.color}"></div>
          ${sec.title}
        </div>
        <div class="section-meta">
          <span class="section-count">${doneSec}/${sec.topics.length}</span>
          <span class="section-chevron ${isOpen?'open':''}">▼</span>
        </div>
      </div>`;
    if (isOpen) {
      html += `<div class="topics-grid">`;
      sec.topics.forEach((topic, ti) => {
        const done = isDone(subj.id, si, ti);
        html += `<div class="topic-item ${done?'done':''}" onclick="toggle('${subj.id}',${si},${ti})">
          <div class="checkbox"><span class="checkmark">✓</span></div>
          <span class="topic-name">${topic.name}</span>
          ${topic.hy ? '<span class="high-yield">HY</span>' : ''}
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  el.innerHTML = html;
}

function markAll(subjId, val) {
  const subj = SUBJECTS.find(s => s.id === subjId);
  subj.sections.forEach((sec, si) => sec.topics.forEach((_, ti) => {
    state[getKey(subjId, si, ti)] = val;
  }));
  localStorage.setItem('neetpg_state', JSON.stringify(state));
  refreshAll();
}

function showTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  event.target.closest('.tab-btn').classList.add('active');
}

}
